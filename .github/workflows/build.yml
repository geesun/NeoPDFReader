name: Build Desktop App

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundles: app,dmg
          - os: ubuntu-22.04
            bundles: appimage,deb
          - os: windows-latest
            bundles: nsis

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libclang-dev \
            clang

      - name: Install macOS LLVM
        if: runner.os == 'macOS'
        run: brew install llvm

      - name: Configure macOS build tools
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "LLVM_AR=$(brew --prefix llvm)/bin/llvm-ar" >> "$GITHUB_ENV"
          echo "$GITHUB_WORKSPACE/src-tauri/.build-tools" >> "$GITHUB_PATH"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit

      - name: Rust check
        shell: bash
        run: |
          cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri bundles
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: error
